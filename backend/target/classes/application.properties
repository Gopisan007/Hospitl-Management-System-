# =========================================
# SERVER CONFIGURATION
# =========================================
server.port=8080
spring.application.name=backend

# =========================================
# MYSQL DATABASE CONFIGURATION
# =========================================
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1212
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================
# JPA / HIBERNATE CONFIGURATION
# =========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# =========================================
# JWT CONFIGURATION
# =========================================
app.jwt.secret=HospitalManagementSystemSecretKeyForJWTToken2024VeryLongSecretKey
app.jwt.expiration=86400000

# =========================================
# CORS CONFIGURATION
# =========================================
app.cors.allowed-origins=http://localhost:3000

# =========================================
# LOGGING CONFIGURATION
# =========================================
logging.level.com.hospital=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# =========================================
# DEVTOOLS CONFIGURATION
# =========================================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true